<head>

<!-- Open Graph -->
<meta property="og:title" content="GIS ORBIT.X Payment Portal">
<meta property="og:description" content="Official Banking Information • Sohar International • Bank Muscat • Mobile Transfer">
<meta property="og:type" content="website">
<meta property="og:url" content="https://gis-orbit-x.github.io/GIS-ORBIT-X/">

<!-- Twitter / X -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="GIS ORBIT.X Payment Portal">
<meta name="twitter:description" content="Official Banking Information">
<meta name="twitter:image" content="https://gis-orbit-x.github.io/GIS-ORBIT-X/bank-preview-gis.webp">

<meta name="theme-color" content="#B71C1C">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

:root{
--oman-red:#B71C1C;
--oman-red-dark:#921515;
--oman-gold:#C9A227;
--white:#ffffff;
--green:#25D366;
--dark:#202020;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:#f7f4ee;
padding:20px;
min-height:100vh;
}

.container{
max-width:760px;
margin:auto;
}

.header{
background:linear-gradient(135deg,#921515,#B71C1C);
border-radius:32px;
overflow:hidden;
margin-bottom:22px;
box-shadow:0 15px 45px rgba(0,0,0,.12);
}

.gold-line{
height:4px;
background:linear-gradient(90deg,transparent,#C9A227,transparent);
}

.header-content{
padding:35px 25px;
text-align:center;
}

.brand-logo{
width:95px;
height:95px;
object-fit:contain;
background:white;
padding:8px;
border-radius:22px;
margin-bottom:18px;
}

.portal-title{
font-size:36px;
font-weight:900;
line-height:1.1;
color:white;
}

.portal-subtitle{
margin-top:10px;
color:rgba(255,255,255,.9);
}

.account-holder{
background:white;
border-radius:28px;
padding:25px;
text-align:center;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.account-holder small{
display:block;
margin-bottom:10px;
color:#888;
}

.account-holder h2{
font-size:34px;
font-weight:900;
}

.verified{
display:inline-block;
margin-top:12px;
padding:8px 16px;
border-radius:50px;
background:#eef8f0;
color:#198754;
font-size:13px;
font-weight:700;
}

.bank-card{
background:white;
border-radius:28px;
padding:28px;
margin-bottom:20px;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.bank-logo{
display:block;
margin:auto;
width:120px;
height:120px;
object-fit:contain;
margin-bottom:18px;
}

.bank-name{
text-align:center;
font-size:28px;
font-weight:900;
margin-bottom:18px;
}

.account-box{
background:#faf8f4;
border:1px solid #ece5d8;
border-radius:22px;
padding:20px;
}

.account-number{
text-align:center;
font-size:34px;
font-weight:900;
color:#B71C1C;
margin-bottom:16px;
word-break:break-all;
}

.btn{
width:100%;
height:60px;
border:none;
border-radius:16px;
font-size:17px;
font-weight:800;
cursor:pointer;
}

.copy-btn{
background:#B71C1C;
color:white;
}

.whatsapp-btn{
display:flex;
justify-content:center;
align-items:center;
margin-top:12px;
background:#25D366;
color:white;
text-decoration:none;
}

.success{
background:#198754 !important;
}

.footer{
background:white;
padding:25px;
border-radius:28px;
text-align:center;
box-shadow:0 8px 25px rgba(0,0,0,.05);
}

.footer-title{
font-size:22px;
font-weight:900;
color:#B71C1C;
}

.footer-text{
color:#777;
font-size:14px;
}

@media(max-width:600px){

.portal-title{
font-size:30px;
}

.account-holder h2{
font-size:28px;
}

.bank-name{
font-size:22px;
}

.bank-logo{
width:90px;
height:90px;
}

.account-number{
font-size:24px;
}

}

</style>
</head>
<body>

<div class="container">

<div class="header">

<div class="gold-line"></div>

<div class="header-content">

<img
src="./gis-orbitx-favicon.webp"
alt="GIS ORBIT.X"
class="brand-logo">

<div class="portal-title">
GIS ORBIT.X<br>
PAYMENT PORTAL
</div>

<div class="portal-subtitle">
Official Banking Information
</div>

</div>
</div>

<div class="account-holder">

<small>ACCOUNT HOLDER NAME</small>

<h2>Nasser Ahmed</h2>

<div class="verified">
✓ Verified Payment Account
</div>

</div>

<div class="bank-card">

<img
src="./Sohar_International.webp"
alt="Sohar International"
class="bank-logo">

<div class="bank-name">
Sohar International
</div>

<div class="account-box">

<div class="account-number">
030010163746
</div>

<button
class="btn copy-btn"
onclick="copyText('030010163746',this)">
Copy Account Number
</button>

</div>
</div>

<div class="bank-card">

<img
src="./bank-muscat-gis.webp"
alt="Bank Muscat"
class="bank-logo">

<div class="bank-name">
Bank Muscat
</div>

<div class="account-box">

<div class="account-number">
0357080217780014
</div>

<button
class="btn copy-btn"
onclick="copyText('0357080217780014',this)">
Copy Account Number
</button>

</div>
</div>

<div class="bank-card">

<img
src="./phone-transfer-gis.webp"
alt="Mobile Transfer"
class="bank-logo">

<div class="bank-name">
Mobile Transfer
</div>

<div class="account-box">

<div class="account-number">
76454193
</div>

<button
class="btn copy-btn"
onclick="copyText('76454193',this)">
Copy Mobile Number
</button>

<a
href="https://wa.me/96876454193"
target="_blank"
class="btn whatsapp-btn">
Open WhatsApp
</a>

</div>
</div>

<div class="footer">

<div class="footer-title">
GIS ORBIT.X
</div>

<div class="footer-text">
Official Payment Information Portal
</div>

</div>

</div>

<script>

function copyText(text,button){

navigator.clipboard.writeText(text);

const original=button.innerHTML;

button.innerHTML='✓ Copied Successfully';

button.classList.add('success');

setTimeout(()=>{

button.innerHTML=original;

button.classList.remove('success');

},2000);

}

document.querySelectorAll('img').forEach(img=>{

img.onerror=()=>{

console.error('Missing Image:',img.src);

};

});

</script>

</body>
</html>
